<VirtualHost *:80>
    ServerName mybook.petroskyfamily.com
    ServerAdmin tedpet5@yahoo.com

    DocumentRoot /var/www/html

    ProxyRequests Off
    ProxyPreserveHost On

    # Forward the WebObjects path through to wotaskd or the running .woa   
    ProxyPass        /apps/WebObjects  http://10.1.13.36:1085/cgi-bin/WebObjects
	ProxyPassReverse /apps/WebObjects  http://10.1.13.36:1085/cgi-bin/WebObjects

    ErrorLog  ${APACHE_LOG_DIR}/mybook-error.log
    CustomLog ${APACHE_LOG_DIR}/mybook-access.log combined
</VirtualHost>